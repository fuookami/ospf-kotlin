name: Core Refactor Guards

on:
  pull_request:
    paths:
      - "ospf-kotlin-core/**"
      - "ospf-kotlin-framework/**"
      - "ospf-kotlin-core-plugin/**"
      - "ospf-kotlin-benchmark/**"
      - "ospf-kotlin-example/**"
      - ".github/workflows/core-refactor-guards.yml"
  push:
    paths:
      - "ospf-kotlin-core/**"
      - "ospf-kotlin-framework/**"
      - "ospf-kotlin-core-plugin/**"
      - "ospf-kotlin-benchmark/**"
      - "ospf-kotlin-example/**"
      - ".github/workflows/core-refactor-guards.yml"

jobs:
  c7-c8-guards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run C7 Regression
        shell: pwsh
        run: ./ospf-kotlin-core/scripts/run-c7-regression.ps1

      - name: Run C8 Guards (P6 Baseline)
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            $baseRef = "${{ github.event.pull_request.base.sha }}"
          } else {
            $baseRef = "HEAD~1"
          }
          ./ospf-kotlin-core/scripts/check-c8-guards.ps1 -GuardMode P6 -BaseRef $baseRef

      - name: Run P7 Guards (Whitelist)
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            $baseRef = "${{ github.event.pull_request.base.sha }}"
          } else {
            $baseRef = "HEAD~1"
          }
          ./ospf-kotlin-core/scripts/check-c8-guards.ps1 -GuardMode P7 -BaseRef $baseRef

  core-demo-only-acceptance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Core Demo Acceptance
        shell: pwsh
        run: |
          mvn -pl ospf-kotlin-example -Pcore-demo-only "-Dtest=CoreDemoTest,GenericNumberDemoTest" -Dsurefire.failIfNoSpecifiedTests=false test

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile Benchmark Module
        shell: pwsh
        run: |
          mvn -pl ospf-kotlin-benchmark -am -Pbench -DskipTests compile

      - name: Run Benchmark Smoke
        shell: pwsh
        run: |
          mvn -pl ospf-kotlin-benchmark -Pbench -DskipTests exec:java "-Dexec.args=.*MultiArrayHotPathBenchmark.blockGetAndContains.* small 1 1 1 json ospf-kotlin-benchmark/target/benchmark-results/ci-smoke.json"

      - name: Build Benchmark Trend Artifacts
        shell: pwsh
        run: |
          $resultsDir = "ospf-kotlin-benchmark/target/benchmark-results"
          Copy-Item -LiteralPath "$resultsDir/ci-smoke.json" -Destination "$resultsDir/baseline-smoke.json" -Force
          Copy-Item -LiteralPath "$resultsDir/ci-smoke.json" -Destination "$resultsDir/current-smoke.json" -Force
          ./ospf-kotlin-benchmark/scripts/compare-benchmark-results.ps1 -ResultsDir $resultsDir -Dataset smoke -Output "$resultsDir/trend-smoke.md"

      - name: Run Benchmark Trend Script Smoke
        shell: pwsh
        run: |
          ./ospf-kotlin-benchmark/scripts/test-compare-benchmark-results.ps1

      - name: Upload Benchmark Smoke Artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke-results
          path: ospf-kotlin-benchmark/target/benchmark-results
          if-no-files-found: error
